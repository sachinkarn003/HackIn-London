spring:
  application:
    name: cart-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8082}

app:
  services:
    product-service-url: ${PRODUCT_SERVICE_URL:http://localhost:8081/products}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
